name: 'Railway Deploy'
description: 'Idempotent Railway deployment from a declarative config file (railway-deploy.jsonc)'
author: 'slopshop'

inputs:
  token:
    description: 'Railway API token (account-level)'
    required: true
  workspace:
    description: 'Railway workspace ID'
    required: true
  config:
    description: 'Path to railway-deploy.jsonc config file'
    required: false
    default: 'railway-deploy.jsonc'

outputs:
  service_url:
    description: 'Public URL of the deployed service (set when config has exactly one service)'
  api_url:
    description: 'Public URL of the service named "api" (set as {name}_url for each service)'

runs:
  using: 'node24'
  main: 'dist/index.js'
